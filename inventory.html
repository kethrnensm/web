<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA-RP Inventory</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { margin: 0; padding: 0; background: transparent; font-family: 'Inter', sans-serif; overflow: hidden; }

        #inventory-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: none; /* Ẩn mặc định */
            flex-direction: column;
            z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .inv-header {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
        }

        .inv-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 15px;
        }

        .inv-slot {
            width: 60px; height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            display: flex; justify-content: center; align-items: center;
            color: #fff; font-size: 24px;
            position: relative; cursor: pointer;
            transition: 0.2s;
        }

        .inv-slot.active { border-color: #00d2d3; background: rgba(0, 210, 211, 0.15); }
        .inv-amount { position: absolute; bottom: 4px; right: 6px; font-size: 11px; font-weight: bold; }

        .inv-actions {
            display: none;
            padding: 10px 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            gap: 10px;
        }

        .btn-action {
            flex: 1; padding: 8px; border: none; border-radius: 4px;
            font-weight: bold; font-size: 12px; cursor: pointer; color: #fff;
        }
        .btn-use { background: #00d2d3; }
        .btn-drop { background: #ff5252; }
    </style>
</head>
<body>

    <div id="inventory-container">
        <div class="inv-header">
            <span>TÚI ĐỒ</span>
            <i class="fa-solid fa-xmark" style="color: #ff5252; cursor:pointer" onclick="closeInventory()"></i>
        </div>
        
        <div class="inv-grid" id="inv-grid"></div>

        <div class="inv-actions" id="inv-actions">
            <button class="btn-action btn-use" onclick="sendAction('use')">SỬ DỤNG</button>
            <button class="btn-action btn-drop" onclick="sendAction('drop')">VỨT BỎ</button>
        </div>
    </div>

    <script>
        let selectedSlot = -1;

        // Định nghĩa vật phẩm (ID -> Icon)
        const ItemIcons = {
            1: "<i class='fa-solid fa-burger'></i>",
            2: "<i class='fa-solid fa-bottle-water'></i>",
            3: "<i class='fa-solid fa-mobile-screen'></i>"
        };

        function updateInventoryUI(jsonData) {
            const grid = document.getElementById('inv-grid');
            grid.innerHTML = '';
            selectedSlot = -1;
            document.getElementById('inv-actions').style.display = 'none';

            const items = JSON.parse(jsonData);
            items.forEach((item, index) => {
                const itemID = item[0];
                const amount = item[1];
                let html = `<div class="inv-slot" id="slot-${index}" onclick="selectSlot(${index}, ${itemID})">`;
                if (itemID > 0) {
                    html += (ItemIcons[itemID] || "<i class='fa-solid fa-box'></i>");
                    html += `<span class="inv-amount">${amount}</span>`;
                }
                html += `</div>`;
                grid.innerHTML += html;
            });
            document.getElementById('inventory-container').style.display = 'flex';
        }

        function selectSlot(slotIndex, itemID) {
            if (itemID === 0) return;
            document.querySelectorAll('.inv-slot').forEach(el => el.classList.remove('active'));
            document.getElementById(`slot-${slotIndex}`).classList.add('active');
            selectedSlot = slotIndex;
            document.getElementById('inv-actions').style.display = 'flex';
        }

        function sendAction(actionType) {
            if (selectedSlot !== -1 && typeof Cef !== 'undefined') {
                Cef.sendEvent("inventory_action", `${actionType}|${selectedSlot}`);
            }
        }

        function closeInventory() {
            document.getElementById('inventory-container').style.display = 'none';
            if (typeof Cef !== 'undefined') Cef.sendEvent("inventory_action", "close|-1");
        }

        // Lắng nghe từ Pawn
        if (typeof Cef !== 'undefined') {
            Cef.registerEventCallback("show_inventory", "updateInventoryUI");
        }
    </script>
</body>
</html>
