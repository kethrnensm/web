<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEF Example Web</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="hunger.css">
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>
        // Khởi tạo vConsole ngay lập tức
        window.vConsole = new window.VConsole();
    </script>
</head>
<body>
    <div id="alert-overlay" class="hidden">
        <div class="alert-box">
            <div class="alert-content">
                <div class="alert-icon">
                    <span>?</span>
                </div>
                <div class="alert-title" id="alert-title">Confirm Title</div>
                <div class="alert-message" id="alert-message">Confirm Message</div>
                <div class="alert-buttons">
                    <button id="okay-button" class="okay-button">Okay</button>
                    <button id="cancel-button" class="cancel-button">Cancel</button>
                </div>
            </div>
        </div>
    </div>
    // notify
    <div id="notify-container"></div>
  //hub
<div id="hud-main" class="hud-container">
  <div class="hud-row">
    <img src="icons/health.png" class="hud-icon">
    <div class="progress-track"><div id="hp-bar" class="progress-fill"></div></div>
  </div>
  <div class="hud-row">
    <img src="icons/food.png" class="hud-icon">
    <div class="progress-track"><div id="hunger-bar" class="progress-fill"></div></div>
  </div>
  <div class="hud-row">
    <img src="icons/water.png" class="hud-icon">
    <div class="progress-track"><div id="water-bar" class="progress-fill"></div></div>
  </div>
</div>

    <script src="script.js"></script>
    <script src="hunger.js"></script>
</body>
</html>
