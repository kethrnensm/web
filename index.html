<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: rgba(0,0,0,0.7); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #222; padding: 20px; border-radius: 10px; border: 2px solid #444; width: 300px; }
        button { width: 100%; padding: 10px; margin-top: 10px; cursor: pointer; background: #e74c3c; border: none; color: white; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Thông tin nhân vật</h2>
        <p>Tên: <span id="name">...</span></p>
        <p>Tiền: <span id="money">0</span>$</p>
        <p>Cấp độ: <span id="level">0</span></p>
        <button onclick="closeUI()">ĐÓNG</button>
    </div>

    <script>
        // Khởi tạo đối tượng cef để nhận dữ liệu từ Game (Android -> Web)
        window.cef = {
            emit: function(event, data) {
                if (event === "updateStats") {
                    const stats = JSON.parse(data);
                    document.getElementById('name').innerText = stats.name;
                    document.getElementById('money').innerText = stats.money;
                    document.getElementById('level').innerText = stats.level;
                }
            }
        };

        // Gửi dữ liệu về Game (Web -> Android -> Server)
        function closeUI() {
            if (window.cef && window.cef.send) {
                window.cef.send("close_ui", "{}");
            }
        }
    </script>
</body>
</html>
