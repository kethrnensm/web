<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA-RP HUD Stats</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Inter', 'Roboto', sans-serif;
            user-select: none;
        }

        /* ĐÃ SỬA: Để mặc định là none để GIẤU HUD lúc chưa login */
        #player-hud-stats {
            position: absolute;
            bottom: 80px;               
            left: 15px;                 
            width: 195px;               
            display: flex;              
            flex-direction: column;
            gap: 6px;
            z-index: 9999;
        }

        .stat-bar-box {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.6); 
            padding: 5px 8px;
            border-radius: 6px;
            border: none !important;        
            outline: none !important;
            backdrop-filter: blur(4px);     
            transition: all 0.3s ease;
        }

        .stat-icon {
            font-size: 13px;
            width: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .icon-hunger { color: #ff9f43; } 
        .icon-thirst { color: #00d2d3; } 

        .stat-progress-bg {
            flex: 1;
            height: 7px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 4px;
            margin: 0 10px;
            overflow: hidden;
        }

        .stat-progress-fill {
            height: 100%;
            border-radius: 4px;
            width: 100%; 
            transition: width 0.4s ease-in-out; 
        }

        #bar-hunger {
            background: linear-gradient(90deg, #ff9f43, #ff5252);
            box-shadow: 0 0 4px rgba(255, 159, 67, 0.4);
        }
        #bar-thirst {
            background: linear-gradient(90deg, #00d2d3, #0a3d62);
            box-shadow: 0 0 4px rgba(0, 210, 211, 0.4);
        }

        .stat-value-text {
            font-size: 11px;
            font-weight: 700;
            color: #ffffff;
            min-width: 32px;
            text-align: right;
            text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.8);
        }

        @keyframes hud-blink-danger {
            0% { opacity: 1; background: rgba(0, 0, 0, 0.6); }
            50% { opacity: 0.6; background: rgba(231, 76, 60, 0.35); }
            100% { opacity: 1; background: rgba(0, 0, 0, 0.6); }
        }
        .bar-danger {
            animation: hud-blink-danger 1.2s infinite ease-in-out;
        }
    </style>
</head>
<body>

    <div id="player-hud-stats">
        <div class="stat-bar-box">
            <div class="stat-icon icon-hunger">
                <i class="fa-solid fa-burger"></i>
            </div>
            <div class="stat-progress-bg">
                <div id="bar-hunger" class="stat-progress-fill"></div>
            </div>
            <span id="text-hunger" class="stat-value-text">100%</span>
        </div>

        <div class="stat-bar-box">
            <div class="stat-icon icon-thirst">
                <i class="fa-solid fa-bottle-water"></i>
            </div>
            <div class="stat-progress-bg">
                <div id="bar-thirst" class="stat-progress-fill"></div>
            </div>
            <span id="text-thirst" class="stat-value-text">100%</span>
        </div>
    </div>

    <script>
        // THÊM: Hàm tiếp nhận lệnh ẩn/hiện từ Pawn ("hud_toggle")
        function toggleHudStatus(status) {
            try {
                const hudContainer = document.getElementById('player-hud-stats');
                if (!hudContainer) return;

                if (parseInt(status, 10) === 1) {
                    hudContainer.style.display = 'flex'; // Hiện HUD
                } else {
                    hudContainer.style.display = 'none'; // Ẩn HUD
                }
            } catch (e) { console.error(e); }
        }

        /* Bộ lọc dữ liệu đa năng chống sập Script */
        function updatePlayerStats(arg1, arg2) {
            let hunger = 100;
            let thirst = 100;

            try {
                if (typeof arg1 === 'string' && arg1.trim().startsWith('[')) {
                    const data = JSON.parse(arg1);
                    hunger = parseInt(data[0], 10);
                    thirst = parseInt(data[1], 10);
                } 
                else if (arg1 !== undefined) {
                    hunger = parseInt(arg1, 10);
                    if (arg2 !== undefined) {
                        thirst = parseInt(arg2, 10);
                    }
                }

                if (isNaN(hunger) || hunger < 0) hunger = 0; if (hunger > 100) hunger = 100;
                if (isNaN(thirst) || thirst < 0) thirst = 0; if (thirst > 100) thirst = 100;

                // CẬP NHẬT THANH THỨC ĂN (HUNGER)
                const barHunger = document.getElementById('bar-hunger');
                const textHunger = document.getElementById('text-hunger');
                if (barHunger && textHunger) {
                    barHunger.style.width = hunger + "%";
                    textHunger.innerText = hunger + "%";

                    const hungerBox = barHunger.closest('.stat-bar-box');
                    if (hunger <= 20) hungerBox.classList.add('bar-danger');
                    else hungerBox.classList.remove('bar-danger');
                }

                // CẬP NHẬT THANH NƯỚC UỐNG (THIRST)
                const barThirst = document.getElementById('bar-thirst');
                const textThirst = document.getElementById('text-thirst');
                if (barThirst && textThirst) {
                    barThirst.style.width = thirst + "%";
                    textThirst.innerText = thirst + "%";

                    const thirstBox = barThirst.closest('.stat-bar-box');
                    if (thirst <= 20) thirstBox.classList.add('bar-danger');
                    else thirstBox.classList.remove('bar-danger');
                }

            } catch (error) {
                console.error("[CEF HUD Error] Lỗi phân tích:", error);
            }
        }

        // ĐĂNG KÝ LẮNG NGHE SỰ KIỆN TỪ GAME SERVER
        if (typeof Cef !== 'undefined') {
            Cef.registerEventCallback("hud_toggle", "toggleHudStatus"); // <-- ĐÃ THÊM LẮNG NGHE BẬT TẮT
            Cef.registerEventCallback("hud_update_stats", "updatePlayerStats");
        }
    </script>
</body>
</html>
