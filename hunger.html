<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA-RP HUD Stats</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Reset nền về trong suốt để không che mất màn hình game */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
            font-family: 'Inter', 'Roboto', sans-serif;
            user-select: none;
        }

        /* KHUNG ĐỊNH VỊ: ĐÃ CHỈNH VỀ NẰM GIỮA - SÁT CẠNH TRÁI */
        #player-hud-stats {
            position: absolute;
            top: 50%;                   /* Đẩy xuống chính giữa theo chiều dọc */
            left: 20px;                 /* Căn sát lề trái màn hình (cách lề 20px) */
            transform: translateY(-50%);/* Giữ chuẩn xác tâm giữa không bị lệch */
            width: 210px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 9999;
        }

        /* Ô BỌC THANH CHỈ SỐ: ĐÃ XÓA KHOẢNG TRẮNG BAO BỌC (BORDER) */
        .stat-bar-box {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.6); /* Nền đen mờ giúp nổi bật chỉ số */
            padding: 6px 10px;
            border-radius: 6px;
            border: none;                   /* Xóa bỏ border cũ để mất viền trắng */
            backdrop-filter: blur(4px);     /* Làm mờ nhẹ cảnh game phía sau nền */
            transition: all 0.3s ease;
        }

        /* Khu vực Icon */
        .stat-icon {
            font-size: 13px;
            width: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .icon-hunger { color: #ff9f43; } /* Màu cam đại diện thức ăn */
        .icon-thirst { color: #00d2d3; } /* Màu xanh đại diện nước uống */

        /* Thanh nền rỗng phía sau */
        .stat-progress-bg {
            flex: 1;
            height: 7px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 4px;
            margin: 0 10px;
            overflow: hidden;
        }

        /* Thanh tiến trình thực tế chạy theo % */
        .stat-progress-fill {
            height: 100%;
            border-radius: 4px;
            width: 100%; /* Mặc định đầy 100% khi mới vào game */
            transition: width 0.4s ease-in-out; /* Hiệu ứng tụt/tăng thanh mượt mà */
        }

        /* Hiệu ứng màu Gradient đổ từ trái sang phải */
        #bar-hunger {
            background: linear-gradient(90deg, #ff9f43, #ff5252);
            box-shadow: 0 0 4px rgba(255, 159, 67, 0.4);
        }
        #bar-thirst {
            background: linear-gradient(90deg, #00d2d3, #0a3d62);
            box-shadow: 0 0 4px rgba(0, 210, 211, 0.4);
        }

        /* Chữ hiển thị số phần trăm (%) */
        .stat-value-text {
            font-size: 11px;
            font-weight: 700;
            color: #ffffff;
            min-width: 32px;
            text-align: right;
            text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.8);
        }

        /* Hiệu ứng Nhấp Nháy Cảnh Báo Nguy Hiểm khi sắp cạn chỉ số (< 20%) */
        @keyframes hud-blink-danger {
            0% { opacity: 1; background: rgba(0, 0, 0, 0.6); }
            50% { opacity: 0.6; background: rgba(231, 76, 60, 0.35); }
            100% { opacity: 1; background: rgba(0, 0, 0, 0.6); }
        }
        .bar-danger {
            animation: hud-blink-danger 1.2s infinite ease-in-out;
        }
    </style>
</head>
<body>

    <div id="player-hud-stats">
        
        <div class="stat-bar-box">
            <div class="stat-icon icon-hunger">
                <i class="fa-solid fa-burger"></i>
            </div>
            <div class="stat-progress-bg">
                <div id="bar-hunger" class="stat-progress-fill"></div>
            </div>
            <span id="text-hunger" class="stat-value-text">100%</span>
        </div>

        <div class="stat-bar-box">
            <div class="stat-icon icon-thirst">
                <i class="fa-solid fa-bottle-water"></i>
            </div>
            <div class="stat-progress-bg">
                <div id="bar-thirst" class="stat-progress-fill"></div>
            </div>
            <span id="text-thirst" class="stat-value-text">100%</span>
        </div>

    </div>

    <script>
        // Hàm cập nhật trạng thái Đói & Khát (Được gọi khi có event từ Server)
        function updatePlayerStats(eventData) {
            try {
                // Phân rã chuỗi JSON nhận được thành mảng dữ liệu mẫu: [hunger, thirst]
                const eventDataJson = JSON.parse(eventData);
                
                let hunger = parseInt(eventDataJson[0], 10);
                let thirst = parseInt(eventDataJson[1], 10);

                // Giới hạn dữ liệu luôn nằm trong khoảng an toàn từ 0 đến 100
                if (isNaN(hunger) || hunger < 0) hunger = 0; if (hunger > 100) hunger = 100;
                if (isNaN(thirst) || thirst < 0) thirst = 0; if (thirst > 100) thirst = 100;

                // ------------------------------------
                // 1. CẬP NHẬT THANH THỨC ĂN (HUNGER)
                // ------------------------------------
                const barHunger = document.getElementById('bar-hunger');
                const textHunger = document.getElementById('text-hunger');
                if (barHunger && textHunger) {
                    barHunger.style.width = hunger + "%";
                    textHunger.innerText = hunger + "%";

                    // Kích hoạt nhấp nháy đỏ nếu đói dưới hoặc bằng 20%
                    const hungerBox = barHunger.closest('.stat-bar-box');
                    if (hunger <= 20) {
                        hungerBox.classList.add('bar-danger');
                    } else {
                        hungerBox.classList.remove('bar-danger');
                    }
                }

                // ------------------------------------
                // 2. CẬP NHẬT THANH NƯỚC UỐNG (THIRST)
                // ------------------------------------
                const barThirst = document.getElementById('bar-thirst');
                const textThirst = document.getElementById('text-thirst');
                if (barThirst && textThirst) {
                    barThirst.style.width = thirst + "%";
                    textThirst.innerText = thirst + "%";

                    // Kích hoạt nhấp nháy đỏ nếu khát dưới hoặc bằng 20%
                    const thirstBox = barThirst.closest('.stat-bar-box');
                    if (thirst <= 20) {
                        thirstBox.classList.add('bar-danger');
                    } else {
                        thirstBox.classList.remove('bar-danger');
                    }
                }
            } catch (error) {
                console.error("[HUD Error] Lỗi phân tách dữ liệu nhận từ Server:", error);
            }
        }

        // ĐĂNG KÝ CALLBACK LẮNG NGHE SỰ KIỆN TỪ GAME SERVER SA-MP XUỐNG
        if (typeof Cef !== 'undefined') {
            Cef.registerEventCallback("hud_update_stats", "updatePlayerStats");
        } else {
            // Dòng dữ liệu kiểm thử giả lập khi bật trên Trình duyệt PC
            console.log("[CEF HUD] Đang chạy trên trình duyệt thường. Test thử dữ liệu...");
            setTimeout(() => {
                updatePlayerStats("[80, 15]"); 
            }, 1000);
        }
    </script>
</body>
</html>
